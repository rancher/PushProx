name: golangci-lint
on:
  pull_request:
    paths-ignore:
    - 'docs/**'
    - '*.md'
    - '.gitignore'
    - 'CODEOWNERS'
    - 'LICENSE'

permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name : Checkout repository
        uses : actions/checkout@v6
      - name : Set up Go
        uses : actions/setup-go@v6
        with:
          go-version: '1.23'
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          skip-cache: true